<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photography - Ching Wong</title>
    <style>
      :root { --bg:#050505; --ink:#f4f1e8; --muted:#a7a49c; --quiet:#5d5a54; --line:rgba(244,241,232,.18); --accent:#e6c2bf; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:"Neue Haas Grotesk Text","Helvetica Neue",Helvetica,Arial,sans-serif; font-size:15px; line-height:1.5; letter-spacing:0; -webkit-font-smoothing:antialiased; animation:pageFade 520ms ease both; }
      a,button { color:inherit; font:inherit; }
      a { text-decoration:none; }
      button { border:0; background:transparent; cursor:pointer; }
      img { display:block; width:100%; }
      a,button,.photo-card img { transition:transform 220ms ease,opacity 220ms ease,filter 220ms ease,border-color 220ms ease,color 220ms ease,background 220ms ease; }
      .menu-toggle{position:fixed;top:22px;left:22px;z-index:40;display:inline-grid;place-items:center;width:54px;height:54px;border:1px solid var(--line);background:rgba(5,5,5,.82);color:var(--accent);backdrop-filter:blur(18px)}
      .menu-toggle::before,.menu-toggle::after{content:"";width:18px;height:1px;background:currentColor;box-shadow:0 7px 0 currentColor}.menu-toggle::after{display:none}body.menu-open .menu-toggle::before{transform:rotate(45deg);box-shadow:0 0 0 currentColor}body.menu-open .menu-toggle::after{display:block;position:absolute;transform:rotate(-45deg)}.menu-toggle:hover{border-color:var(--accent);transform:rotate(2deg)}
      .sidebar{position:fixed;inset:0 auto 0 0;z-index:30;display:grid;width:min(390px,calc(100vw - 28px));padding:104px 28px 28px;border-right:1px solid var(--line);background:rgba(5,5,5,.96);backdrop-filter:blur(22px);transform:translateX(-100%);transition:transform 260ms ease}body.menu-open .sidebar{transform:translateX(0)}
      .side-kicker,.side-note,.label{color:var(--quiet);font-size:10px;line-height:1.1;text-transform:uppercase;letter-spacing:.08em}.side-name{display:block;margin-top:12px;color:var(--ink);font-size:30px;font-weight:300;line-height:1.02}.side-nav{align-self:center;display:grid;gap:14px}.side-nav a{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--line);color:var(--muted);font-size:17px}.side-nav a:hover,.side-nav a:focus-visible{color:var(--accent);transform:translateX(4px)}.side-nav span:first-child{color:var(--quiet);font-size:10px}.side-footer{align-self:end;display:grid;gap:13px}.side-footer a{width:max-content;border-bottom:1px solid var(--accent);color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
      main{min-height:100vh;padding:32px 32px 56px 96px}.photo-head{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:end;min-height:128px;padding-bottom:24px;border-bottom:1px solid var(--line);animation:contentRise 680ms cubic-bezier(.22,1,.36,1) both}h1{margin:0;font-size:clamp(46px,8vw,124px);font-weight:300;line-height:.88}.photo-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;height:calc(100vh - 210px);min-height:640px;margin-top:28px;overflow:hidden;animation:contentRise 680ms cubic-bezier(.22,1,.36,1) 90ms both}.photo-column{overflow:hidden}.photo-column-track{display:grid;gap:14px;will-change:transform}.photo-column:nth-child(odd) .photo-column-track{animation:photosDown 90s linear infinite}.photo-column:nth-child(even) .photo-column-track{animation:photosUp 90s linear infinite}.photo-column:hover .photo-column-track{animation-play-state:paused}.photo-card{position:relative;display:block;width:100%;overflow:hidden;background:#111}.photo-card img{height:auto;filter:grayscale(1) contrast(1.08)}.photo-card:hover,.photo-card:focus-visible{transform:scale(.985)}.photo-card:hover img,.photo-card:focus-visible img{filter:grayscale(.1) contrast(1.04)}@keyframes photosUp{from{transform:translateY(0)}to{transform:translateY(calc(-50% - 7px))}}@keyframes photosDown{from{transform:translateY(calc(-50% - 7px))}to{transform:translateY(0)}}
      .lightbox{position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:28px;background:rgba(5,5,5,.88);backdrop-filter:blur(18px)}.lightbox.is-open{display:grid}.lightbox img{width:auto;max-width:min(100%,1100px);max-height:88vh;object-fit:contain}.lightbox-close{position:fixed;top:22px;right:22px;display:grid;place-items:center;width:54px;height:54px;border:1px solid var(--line);background:rgba(5,5,5,.82);color:var(--accent);font-size:18px}.lightbox-close:hover,.lightbox-close:focus-visible{border-color:var(--accent);transform:rotate(2deg)}
      @keyframes pageFade{from{opacity:0}to{opacity:1}}@keyframes contentRise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
      @media(max-width:980px){main{padding:92px 16px 32px}.photo-head{grid-template-columns:1fr;min-height:auto}.photo-grid{grid-template-columns:repeat(2,minmax(0,1fr));height:72vh}.photo-column:nth-child(3){display:none}}
      @media(max-width:560px){.photo-grid{grid-template-columns:1fr}.photo-column:nth-child(2){display:none}}
      @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:1ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:1ms!important}body,.photo-head,.photo-grid{animation:none!important}}
    </style>
  </head>
  <body>
    <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false"></button>
    <aside class="sidebar" aria-label="Portfolio menu">
      <a href="index.html"><span class="side-kicker">Graphic Design</span><span class="side-name">Ching Wong</span></a>
      <nav class="side-nav" aria-label="Main navigation"><a href="projects.html"><span>01</span><span>Projects</span></a><a href="photography.html"><span>02</span><span>Photography</span></a><a href="about.html"><span>03</span><span>About</span></a><a href="contact.html"><span>04</span><span>Contact</span></a><a href="cv.html"><span>05</span><span>CV</span></a></nav>
      <div class="side-footer"><span class="side-note">Identity / Editorial / Print</span><a href="mailto:orfediawong@icloud.com">orfediawong@icloud.com</a></div>
    </aside>
    <main>
      <header class="photo-head"><h1>Photography</h1><span class="label">Selected images</span></header>
      <section class="photo-grid" aria-label="Photography gallery">
        <div class="photo-column"></div><div class="photo-column"></div><div class="photo-column"></div>
      </section>
    </main>
    <div class="lightbox" id="photo-lightbox" role="dialog" aria-modal="true" aria-label="Photography image viewer">
      <button class="lightbox-close" type="button" aria-label="Close image viewer">X</button>
      <img id="lightbox-image" src="assets/photography/dsc1530.jpg" alt="Selected photography image enlarged" />
    </div>
    <script>
      const photos = ["dsc1530","dsc1645","dsc2433","dsc2457","dsc2468","dsc2480","dsc2485","dsc2493","dsc2539","dsc2543","dsc2565","dsc2629","dsc2637","dsc2652","dsc2777","dsc2789","dsc2805","dsc2851","dsc2865","dsc2871","dsc2881","dsc2905","img0253","img2059","img2060","img2062","img2065","img2072","img2075","img2541","img2563","img3761","img6539","img6541"];
      const columns = Array.from(document.querySelectorAll(".photo-column"));
      const photoGroups = [[], [], []];
      photos.forEach((name, index) => photoGroups[index % 3].push({ name, index }));
      columns.forEach((column, columnIndex) => {
        const items = photoGroups[columnIndex];
        const renderItems = (hidden = false) => items.map(({ name, index }) => {
          const src = `assets/photography/${name}.jpg`;
          return `<button class="photo-card" type="button" data-full="${src}" aria-label="Open photography image ${index + 1}"${hidden ? ' aria-hidden="true" tabindex="-1"' : ""}><img src="${src}" alt="Black and white street photograph ${index + 1}" loading="lazy" decoding="async" /></button>`;
        }).join("");
        column.innerHTML = `<div class="photo-column-track">${renderItems()}${renderItems(true)}</div>`;
      });

      const menuButton = document.querySelector(".menu-toggle");
      const photoButtons = Array.from(document.querySelectorAll(".photo-card"));
      const lightbox = document.querySelector("#photo-lightbox");
      const lightboxImage = document.querySelector("#lightbox-image");
      const lightboxClose = document.querySelector(".lightbox-close");

      function setMenu(open) {
        document.body.classList.toggle("menu-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
        menuButton.setAttribute("aria-label", open ? "Close menu" : "Open menu");
      }

      function setLightbox(open, src) {
        if (src) lightboxImage.src = src;
        lightbox.classList.toggle("is-open", open);
      }

      menuButton.addEventListener("click", () => setMenu(!document.body.classList.contains("menu-open")));
      photoButtons.forEach((button) => button.addEventListener("click", () => setLightbox(true, button.dataset.full)));
      lightboxClose.addEventListener("click", () => setLightbox(false));
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) setLightbox(false);
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") setLightbox(false);
      });
    </script>
  </body>
</html>

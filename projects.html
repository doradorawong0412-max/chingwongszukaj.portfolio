<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projects - Ching Wong</title>
    <style>
      :root {
        --bg: #050505;
        --ink: #f4f1e8;
        --muted: #a7a49c;
        --quiet: #5d5a54;
        --line: rgba(244, 241, 232, 0.18);
        --accent: #e6c2bf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Neue Haas Grotesk Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      a {
        text-decoration: none;
      }

      button {
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .menu-toggle {
        position: fixed;
        top: 22px;
        left: 22px;
        z-index: 40;
        display: inline-grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border: 1px solid var(--line);
        background: rgba(5, 5, 5, 0.82);
        color: var(--accent);
        backdrop-filter: blur(18px);
      }

      .menu-toggle::before,
      .menu-toggle::after {
        content: "";
        width: 18px;
        height: 1px;
        background: currentColor;
        box-shadow: 0 7px 0 currentColor;
      }

      .menu-toggle::after {
        display: none;
      }

      body.menu-open .menu-toggle::before {
        transform: rotate(45deg);
        box-shadow: 0 0 0 currentColor;
      }

      body.menu-open .menu-toggle::after {
        display: block;
        position: absolute;
        transform: rotate(-45deg);
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        display: grid;
        width: min(390px, calc(100vw - 28px));
        padding: 104px 28px 28px;
        border-right: 1px solid var(--line);
        background: rgba(5, 5, 5, 0.96);
        backdrop-filter: blur(22px);
        transform: translateX(-100%);
        transition: transform 260ms ease;
      }

      body.menu-open .sidebar {
        transform: translateX(0);
      }

      .side-kicker,
      .side-note,
      .project-meta {
        color: var(--quiet);
        font-size: 10px;
        line-height: 1.1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .side-name {
        display: block;
        margin-top: 12px;
        color: var(--ink);
        font-size: 30px;
        font-weight: 300;
        line-height: 1.02;
      }

      .side-nav {
        align-self: center;
        display: grid;
        gap: 14px;
      }

      .side-nav a {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 12px;
        align-items: baseline;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 17px;
      }

      .side-nav a:hover,
      .side-nav a:focus-visible {
        color: var(--accent);
      }

      .side-nav span:first-child {
        color: var(--quiet);
        font-size: 10px;
      }

      .side-footer {
        align-self: end;
        display: grid;
        gap: 13px;
      }

      .side-footer a {
        width: max-content;
        border-bottom: 1px solid var(--accent);
        color: var(--accent);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      main {
        min-height: 100vh;
        padding: 32px 32px 38px 96px;
      }

      header {
        display: flex;
        align-items: end;
        min-height: 128px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(64px, 12vw, 184px);
        font-weight: 300;
        line-height: 0.88;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        grid-auto-flow: dense;
        gap: clamp(12px, 1.5vw, 24px);
        padding-top: 28px;
      }

      .project-card {
        position: relative;
        overflow: hidden;
        grid-column: span 4;
        margin: 0;
        min-width: 0;
        aspect-ratio: 4 / 5;
        border: 1px solid var(--line);
        background: #111;
      }

      .project-card:nth-child(1) {
        grid-column: span 4;
        aspect-ratio: 4 / 5;
      }

      .project-card:nth-child(2),
      .project-card:nth-child(3) {
        grid-column: span 4;
        aspect-ratio: 4 / 5;
      }

      .project-card:nth-child(4),
      .project-card:nth-child(5) {
        grid-column: span 4;
        aspect-ratio: 4 / 5;
      }

      .project-card:nth-child(5) {
        grid-column: span 4;
      }

      .project-card img {
        height: 100%;
        margin-top: 0;
        filter: grayscale(1) contrast(1.08);
        transition: transform 420ms ease, filter 420ms ease;
      }

      .project-card:hover img,
      .project-card:focus-visible img {
        filter: grayscale(0.35) contrast(1.14);
        transform: scale(1.025);
      }

      .graphic-design {
        margin-top: clamp(72px, 10vw, 150px);
        padding-top: 24px;
        border-top: 1px solid var(--line);
        overflow: hidden;
      }

      .graphic-design-head {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: baseline;
        padding-bottom: 28px;
      }

      .graphic-design h2 {
        margin: 0;
        font-size: clamp(38px, 6vw, 92px);
        font-weight: 300;
        line-height: 0.95;
      }

      .graphic-design-note {
        color: var(--quiet);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .design-marquee {
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      .design-track {
        display: flex;
        width: max-content;
        gap: 16px;
      }

      .design-item {
        flex: 0 0 auto;
        width: clamp(260px, 34vw, 620px);
        height: clamp(300px, 42vw, 680px);
        overflow: hidden;
        background: transparent;
      }

      .design-item img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: transparent;
      }

      .design-controls {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
      }

      .design-control {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border: 1px solid var(--line);
        color: var(--accent);
        font-size: 19px;
      }

      .design-control:hover,
      .design-control:focus-visible {
        border-color: var(--accent);
      }

      .project-card span {
        position: absolute;
        left: 14px;
        bottom: 12px;
        color: var(--ink);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .project-card::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 34%;
        background: rgba(5, 5, 5, 0.62);
        pointer-events: none;
      }

      .project-card span {
        z-index: 1;
      }

      .project-card .project-meta {
        top: 12px;
        bottom: auto;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        main {
          padding: 92px 16px 28px;
        }

        .project-grid {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .project-card:nth-child(n) {
          grid-column: span 2;
          grid-row: span 1;
          aspect-ratio: 4 / 5;
        }

        .project-card:nth-child(1),
        .project-card:nth-child(4),
        .project-card:nth-child(5) {
          grid-column: span 2;
          aspect-ratio: 4 / 5;
        }
      }

      @media (max-width: 560px) {
        .project-grid {
          grid-template-columns: 1fr;
        }

        .project-card:nth-child(n) {
          grid-column: span 1;
          aspect-ratio: 4 / 5;
        }

        .graphic-design-head {
          display: grid;
        }

        .design-item {
          width: 78vw;
          height: 96vw;
        }
      }
      body { animation: pageFade 520ms ease both; }
      a, button, .project-card, .photo-button, .poster, .board img, .gallery-image img, .gallery-image video { transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease, border-color 220ms ease, color 220ms ease, background 220ms ease; }
      main > * { animation: contentRise 680ms cubic-bezier(0.22, 1, 0.36, 1) both; }
      main > *:nth-child(2) { animation-delay: 80ms; }
      main > *:nth-child(3) { animation-delay: 150ms; }
      .side-nav a:hover, .side-nav a:focus-visible, .back-link:hover, .contact-link:hover, .view-work:hover { transform: translateX(4px); }
      .project-card:hover, .photo-button:hover, .poster:hover { transform: translateY(-3px); }
      .board:hover img, .poster:hover img, .hero-image:hover img { transform: scale(1.015); }
      .menu-toggle:hover { border-color: var(--accent); transform: rotate(2deg); }
       @keyframes pageFade { from { opacity: 0; } to { opacity: 1; } }
       @keyframes contentRise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
       @media (prefers-reduced-motion: reduce) { body, main > * { animation: none !important; } }
    </style>
  </head>
  <body>

    <script>
      const menuButton = document.querySelector(".menu-toggle");
      const designMarquee = document.querySelector(".design-marquee");
      const designTrack = document.querySelector(".design-track");
      const designPrev = document.querySelector(".design-prev");
      const designNext = document.querySelector(".design-next");
      let designPausedUntil = 0;

      function animateDesignGallery(time) {
        if (time > designPausedUntil) designMarquee.scrollLeft += 0.32;
        const midpoint = designTrack.scrollWidth / 2;
        if (designMarquee.scrollLeft >= midpoint) designMarquee.scrollLeft -= midpoint;
        requestAnimationFrame(animateDesignGallery);
      }

      function moveDesignGallery(direction) {
        designPausedUntil = performance.now() + 2800;
        if (direction < 0 && designMarquee.scrollLeft < 10) designMarquee.scrollLeft = designTrack.scrollWidth / 2;
        designMarquee.scrollBy({ left: direction * Math.min(window.innerWidth * 0.72, 620), behavior: "smooth" });
      }

      function setMenu(open) {
        document.body.classList.toggle("menu-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
        menuButton.setAttribute("aria-label", open ? "Close menu" : "Open menu");
      }

      menuButton.addEventListener("click", () => setMenu(!document.body.classList.contains("menu-open")));
      designPrev.addEventListener("click", () => moveDesignGallery(-1));
      designNext.addEventListener("click", () => moveDesignGallery(1));
      requestAnimationFrame(animateDesignGallery);
    </script>
